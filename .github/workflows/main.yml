name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24.x

    - name: Install dependencies (root + server)
      run: |
        npm ci
        cd server && npm ci

    - name: Run tests
      run: npm test
