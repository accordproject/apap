name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - v4.0.0 # Temporary, while we prepare for merge to main

jobs:
  build:
    name: Unit Tests

    strategy:
      matrix:
        node-version:
          - 22.x
          - 24.x
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: git checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install global tools for strict dependency linting
        run: npm install -g lockfile-lint syncpack

      - name: Install dependencies (root + server)
        shell: bash
        run: |
          npm ci
          cd server && npm ci
      - run: npm run build --if-present
      - name: Run tests
        shell: bash
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: npm test

      - name: Archive npm failure logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: npm-logs
          path: C:\npm\cache\_logs\

  publish:
    needs:
      - build
    name: Publish to npm
    # Soft-disabled: this job references `scripts/timestamp.js` and
    # `scripts/bump_version.js` which do not exist in the repo (never have,
    # per `git log --all`). It was previously blocked by the matrix failures
    # #212 fixed, so its own missing-script failure never surfaced. Setting
    # `if: false` keeps main green while the deployment story is figured out
    # in a follow-up. To re-enable, restore the two scripts (or drop the
    # timestamp + bump steps and rely on manual package.json versioning) and
    # replace this line with the original guard, kept below for reference:
    # if: ${{ success() && github.event_name == 'push' && github.repository_owner == 'accordproject' }}
    if: false
    runs-on: ubuntu-latest

    outputs:
      job-status: ${{ job.status }}

    steps:
      - name: git checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install global tools for strict dependency linting
        run: npm install -g lockfile-lint syncpack

      - run: npm ci
      - run: npm run build --if-present

      - name: timestamp
        id: timestamp
        run: |
          node ./scripts/timestamp.js

      - name: build and publish
        run: |
          npm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}
          node ./scripts/bump_version.js ${{ steps.timestamp.outputs.stamp }}
          npm version --workspaces --include-workspace-root --no-git-tag-version --yes --exact ${{ steps.timestamp.outputs.stamp }}
          npm publish --workspaces --access public --tag=unstable 2>&1